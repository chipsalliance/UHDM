# Universal Hardware Data Model (UHDM) "parameter" formal description

- obj_def: parameter
- extends: simple_expr
- property: const_type
  vpi: vpiConstType
  type: int32_t
  card: 1
- class_ref: expr
  vpi: vpiExpr
  type: expr
  card: 1
- obj_ref: range
  vpi: vpiRange
  type: range
  card: any
- property: local_param
  vpi: vpiLocalParam
  type: bool
  card: 1
- property: name
  vpi: vpiName
  type: string
  card: 1
- property: full_name
  vpi: vpiFullName
  type: string
  card: 1
# Not standard, name of the package it is imported from
- property: imported
  vpi: vpiImported
  type: string
  card: 1
